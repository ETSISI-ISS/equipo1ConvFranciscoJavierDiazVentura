trigger:
- main

pool:
  vmImage: ubuntu-latest

stages:

# ==========================================
# STAGE 1: CONTINUOUS INTEGRATION (CI)
# ==========================================
- stage: CI_BuildAndTest
  displayName: 'CI: Test & Package Simulator'
  jobs:
  - job: RunTests
    displayName: 'Test on Python Versions'
    strategy:
      matrix:
        Python38:
          python.version: '3.8'
        Python39:
          python.version: '3.9'
        Python310:
          python.version: '3.10'
        Python311:
          python.version: '3.11'
    steps:
    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(python.version)'
      displayName: 'Use Python $(python.version)'

    - script: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      displayName: 'Install dependencies'

    - script: |
        pip install flake8 black
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
      displayName: 'Analyze Code (Lint & Format)'

    - script: |
        pip install pytest pytest-azurepipelines
        pytest --suppress-no-test-exit-code || true
      displayName: 'Execute Pytest Suite'
      env:
        IOTHUB_CONNECTION_STRING: $(IOTHUB_CONNECTION_STRING)

  - job: PackageArtifact
    displayName: 'Bundle Application'
    dependsOn: RunTests
    condition: succeeded()
    steps:
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(Build.SourcesDirectory)'
        Contents: |
          *.py
          requirements.txt
        TargetFolder: '$(Build.BinariesDirectory)/simulator'
      displayName: 'Stage simulator files'

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.BinariesDirectory)/simulator'
        includeRootFolder: false
        archiveType: 'zip'
        archiveFile: '$(Build.ArtifactStagingDirectory)/device-simulator.zip'
        replaceExistingArchive: true
      displayName: 'Create deployment zip'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)/device-simulator.zip'
        ArtifactName: 'drop'
        publishLocation: 'Container'
      displayName: 'Publish Blueprint to Azure DevOps'

# ==========================================
# STAGE 2: CONTINUOUS DEPLOYMENT (CD)
# ==========================================
- stage: CD_Deploy
  displayName: 'CD: Deploy Simulator'
  dependsOn: CI_BuildAndTest
  # Only deploy if the CI stage succeeded AND we are building the main branch
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: DeployToEnvironment
    displayName: 'Deploy Simulator Package'
    steps:
    # 1. Pull the exact zip file compiled in the CI stage
    - task: DownloadBuildArtifacts@0
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'drop'
        downloadPath: '$(Pipeline.Workspace)'
      displayName: 'Download CI Build Artifacts'

    # 2. Deployment execution step
    - script: |
        echo "Extracting simulator files..."
        unzip $(Pipeline.Workspace)/drop/device-simulator.zip -d $(Pipeline.Workspace)/running-simulator
        echo "Ready to execute or transfer simulator package."
        # Add your target-specific deployment commands here (e.g., Azure CLI commands, SSH, etc.)
      displayName: 'Deploy and Initialize Simulator'